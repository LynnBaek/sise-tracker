<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 꿈틀</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #080c12;
  --surf1: #0f1420;
  --surf2: #161d2e;
  --surf3: #1e2840;
  --border: #243050;
  --border2: #1a2438;
  --blue: #3b82f6;
  --blue2: #1d4ed8;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #4a5568;
}
html.light {
  --bg: #f4f6fa;
  --surf1: #ffffff;
  --surf2: #f0f3f8;
  --surf3: #e4eaf4;
  --border: #d1d9e6;
  --border2: #e2e8f0;
  --blue: #2563eb;
  --blue2: #1d4ed8;
  --green: #059669;
  --amber: #d97706;
  --red: #dc2626;
  --purple: #7c3aed;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
}

/* 라이트모드 세부 보정 */
html.light .search-box,
html.light .api-input,
html.light .ig input,
html.light .form-group input,
html.light .form-group select,
html.light .form-group textarea { background:#fff; color:#0f172a; }
html.light .sel { background:#fff; color:#475569; }
html.light .editable-cell input { color:#0f172a; }
html.light .editable-cell input:focus { background:rgba(37,99,235,.06); }
html.light .api-tr:hover { background:#e9eef7; }
html.light .tbl tr:hover td { background:#f0f3f8; }
html.light .sheet-wrap::-webkit-scrollbar-track { background:#f4f6fa; }
html.light .modal { background:#fff; }
html.light .api-wrap { background:#f4f6fa; }
html.light .row-buy td, html.light .row-rent td, html.light .row-listings td { background:#fff; }
html.light .row-calc td { background:#f8fafc; }

/* 토글 버튼 */
.theme-toggle {
  display:flex;align-items:center;gap:7px;cursor:pointer;
  background:var(--surf2);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px 5px 8px;
  font-size:11px;color:var(--text2);transition:all .2s;
  white-space:nowrap;user-select:none;
}
.theme-toggle:hover { border-color:var(--blue); color:var(--text); }
.toggle-track {
  width:28px;height:16px;border-radius:8px;
  background:var(--surf3);border:1px solid var(--border);
  position:relative;transition:background .2s;flex-shrink:0;
}
.toggle-thumb {
  width:10px;height:10px;border-radius:50%;
  background:var(--text3);position:absolute;top:2px;left:2px;
  transition:transform .2s, background .2s;
}
html.light .toggle-track { background:#bfdbfe; border-color:#93c5fd; }
html.light .toggle-thumb { background:var(--blue); transform:translateX(12px); }
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── 탭바 ─────────────────────────── */
.tabbar{display:flex;align-items:center;background:var(--surf1);border-bottom:1px solid var(--border);padding:0 16px;height:48px;gap:4px;flex-shrink:0}
.logo{font-size:20px;font-weight:800;color:var(--blue);margin-right:16px;letter-spacing:-0.5px;white-space:nowrap}
.logo span{color:#f472b6;font-weight:800}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text2);background:var(--surf2)}
.tab.active{color:var(--text);background:var(--surf3);font-weight:500}
.tabbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── 공통 레이아웃 ─────────────────── */
.page{display:none;flex:1;overflow:hidden}
.page.active{display:flex}

/* ════════════════════════════════════
   뷰 1: 단지 관리 (2컬럼)
════════════════════════════════════ */
.apt-mgr{display:grid;grid-template-columns:300px 1fr;height:100%;width:100%}

/* 좌측 리스트 */
.apt-list-panel{background:var(--surf1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-head{padding:12px;border-bottom:1px solid var(--border2)}
.search-box{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:7px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none}
.search-box:focus{border-color:var(--blue)}
.search-box::placeholder{color:var(--text3)}
.filter-row{display:flex;gap:6px;margin-top:8px}
.sel{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:6px 8px;border-radius:6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer}
.list-scroller{flex:1;overflow-y:auto;padding:6px}
.list-scroller::-webkit-scrollbar{width:3px}
.list-scroller::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.list-item{padding:10px 12px;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .12s}
.list-item:hover{background:var(--surf2);border-color:var(--border2)}
.list-item.sel{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.35)}
.list-item .li-name{font-size:13px;font-weight:500;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.list-item .li-meta{font-size:11px;color:var(--text3);display:flex;gap:6px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.list-count{font-size:11px;color:var(--text3);padding:6px 12px}

/* 우측 상세 패널 */
.apt-detail-panel{display:flex;flex-direction:column;overflow:hidden}
.empty-hint{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text3)}
.empty-hint svg{opacity:.25}

.detail-scroll{flex:1;overflow-y:auto;padding:20px}
.detail-scroll::-webkit-scrollbar{width:4px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 단지 헤더 */
.dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.dh-title{font-size:20px;font-weight:700;margin-bottom:3px}
.dh-loc{font-size:12px;color:var(--text3)}
.btn-row{display:flex;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{background:var(--surf2);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text3);border:none}
.btn-ghost:hover{color:var(--red)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{filter:brightness(1.1)}
.btn-amber{background:var(--amber);color:#000}
.btn-amber:hover{filter:brightness(1.1)}

/* info 카드 그리드 */
.info-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.ic{background:var(--surf2);border:1px solid var(--border2);border-radius:9px;padding:12px 14px}
.ic .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.ic .val{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.ic .unit{font-size:11px;color:var(--text3);font-family:'Noto Sans KR',sans-serif;font-weight:400;margin-left:2px}

/* 배지 */
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.badge{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500}
.bs{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.ba{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.bb{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.bc{background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.3)}

/* section card */
.sec{background:var(--surf1);border:1px solid var(--border2);border-radius:10px;padding:16px;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sec-title-l{display:flex;align-items:center;gap:8px}
.sec-title-l::before{content:'';display:inline-block;width:3px;height:13px;background:var(--blue);border-radius:2px}

/* 입력 폼 */
.input-row{display:grid;grid-template-columns:150px 1fr 1fr 1fr 1fr auto;gap:8px;align-items:end}
.ig{display:flex;flex-direction:column;gap:4px}
.ig label{font-size:11px;color:var(--text3)}
.ig input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:6px;font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;width:100%;transition:border-color .15s}
.ig input:focus{border-color:var(--blue)}
.ig input[type=date]{color-scheme:dark;font-family:'Noto Sans KR',sans-serif;font-size:12px}

/* 실거래가 API 영역 */
.api-wrap{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:12px}
.api-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.api-label{font-size:11px;color:var(--text3);width:70px;flex-shrink:0}
.api-input{flex:1;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none}
.api-input:focus{border-color:var(--blue)}
.api-result{background:var(--surf2);border-radius:6px;overflow:hidden;max-height:200px;overflow-y:auto}
.api-result::-webkit-scrollbar{width:3px}
.api-result::-webkit-scrollbar-thumb{background:var(--border)}
.api-tr{display:grid;grid-template-columns:90px 80px 80px 60px 1fr;gap:6px;padding:7px 10px;font-size:11px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s;font-family:'JetBrains Mono',monospace}
.api-tr:hover{background:var(--surf3)}
.api-tr.hdr{color:var(--text3);cursor:default;background:var(--surf1)!important;font-family:'Noto Sans KR',sans-serif;font-size:10px}
.api-price{color:var(--blue);font-weight:600}
.api-info{color:var(--text3);font-size:10px}

/* 이력 테이블 */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:7px 10px;color:var(--text3);border-bottom:1px solid var(--border);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(36,48,80,.4);font-family:'JetBrains Mono',monospace;color:var(--text2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surf2)}
.tbl .price{color:var(--text);font-weight:600}
.tbl .ratio{color:var(--green)}
.tbl .gap{color:var(--amber)}
.tbl .up{color:var(--red)}
.tbl .dn{color:var(--green)}
.tbl .flat{color:var(--text3)}

/* 차트 */
.chart-box{position:relative;height:220px}

/* ════════════════════════════════════
   뷰 2: 시트뷰 (엑셀 스타일)
════════════════════════════════════ */
.sheet-view{flex-direction:column}
.sheet-toolbar{padding:10px 16px;background:var(--surf1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.sheet-wrap{flex:1;overflow:auto}
.sheet-wrap::-webkit-scrollbar{width:8px;height:8px}
.sheet-wrap::-webkit-scrollbar-track{background:var(--bg)}
.sheet-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.sheet-tbl{border-collapse:collapse;font-size:11px;white-space:nowrap}
.sheet-tbl th,.sheet-tbl td{border:1px solid var(--border2);padding:0}
/* 고정 헤더 */
.sheet-tbl thead th{background:var(--surf2);color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.3px;padding:6px 8px;position:sticky;top:0;z-index:10;font-weight:500}
/* 고정 첫번째 열 */
.sheet-tbl td:first-child,.sheet-tbl th:first-child{position:sticky;left:0;z-index:5;background:var(--surf2)!important}
.sheet-tbl thead th:first-child{z-index:15}

/* 행 타입별 스타일 */
.row-name td{background:var(--surf1)}
.row-name .cell-name{font-size:12px;font-weight:600;color:var(--text);padding:8px 10px}
.row-buy td,.row-rent td,.row-listings td{background:var(--bg)}
.row-buy td,.row-rent td,.row-listings td{padding:0}
.row-calc td{background:rgba(15,20,32,.8)}
.row-calc td{padding:5px 8px;color:var(--text3);font-family:'JetBrains Mono',monospace}

.row-label{width:80px;font-size:10px;color:var(--text3);padding:5px 8px!important;text-align:right;background:var(--surf1)!important;border-right:2px solid var(--border)!important}
.row-date-label{width:80px;font-size:10px;color:var(--text2);padding:5px 8px!important;text-align:right;background:var(--surf2)!important;border-right:2px solid var(--blue)!important;font-family:'JetBrains Mono',monospace}

/* 편집 셀 */
.editable-cell{width:90px;padding:0}
.editable-cell input{width:100%;background:transparent;border:none;color:var(--text);padding:5px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;text-align:right}
.editable-cell input:focus{background:rgba(59,130,246,.08);box-shadow:inset 0 0 0 1px var(--blue)}
.editable-cell input::placeholder{color:var(--text3)}
.cell-val{padding:5px 8px;text-align:right;font-family:'JetBrains Mono',monospace}
.cell-buy{color:var(--text);font-weight:600}
.cell-rent{color:var(--green)}
.cell-ratio{color:var(--text2)}
.cell-gap{color:var(--amber)}
.cell-pyeong{color:var(--text3)}
.cell-listings{color:var(--purple)}

/* 단지명 셀 */
.apt-name-cell{min-width:140px;max-width:160px;padding:6px 8px!important}
.apt-name-cell .anc-name{font-size:12px;font-weight:500;color:var(--text);display:block;overflow:hidden;text-overflow:ellipsis}
.apt-name-cell .anc-sub{font-size:9px;color:var(--text3);display:flex;gap:4px;margin-top:1px}

/* ════════════════════════════════════
   뷰 3: 단지 추가/편집 모달
════════════════════════════════════ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--surf1);border:1px solid var(--border);border-radius:12px;width:560px;max-height:80vh;overflow-y:auto;padding:24px}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1}
.modal-close:hover{color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;color:var(--text3)}
.form-group input,.form-group select,.form-group textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:6px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group select option{background:var(--surf2)}
.form-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border2)}

/* ── toast ──────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:300;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green)}
.toast.err{border-color:rgba(239,68,68,.4);color:var(--red)}

.no-data{text-align:center;padding:24px;color:var(--text3);font-size:12px}
.loading{text-align:center;padding:12px;color:var(--text3);font-size:11px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* 로그인 오버레이 */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surf1);border:1px solid var(--border);border-radius:14px;padding:36px 40px;width:360px;text-align:center}
.login-logo{font-size:22px;font-weight:700;color:var(--blue);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:28px}
.login-box .form-group{text-align:left;margin-bottom:14px}
.login-box .form-group label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px}
.login-box .form-group input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 13px;border-radius:7px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s}
.login-box .form-group input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:6px;transition:background .15s}
.login-btn:hover{background:var(--blue2)}
.login-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}
.user-badge{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.user-badge span{color:var(--text2)}

.trend{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace}
.trend.up{background:rgba(239,68,68,.15);color:#ef4444}
.trend.dn{background:rgba(16,185,129,.15);color:#10b981}

<body>

<!-- 탭바 -->
<div class="tabbar">
  <div class="logo">🏢 부동산<span> 꿈틀</span></div>
  <button class="tab active" onclick="switchTab('mgr')">단지 관리</button>
  <button class="tab" onclick="switchTab('sheet')">시트 뷰</button>
  <button class="tab" onclick="switchTab('map')">지도 뷰</button>
  <div class="tabbar-right">
    <div class="theme-toggle" onclick="toggleTheme()" title="라이트/다크 전환">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span id="themeLabel">다크</span>
    </div>
    <button class="btn btn-outline" style="font-size:11px" onclick="openSettingsModal()">⚙️ 설정</button>
    <div id="authButtons">
      <!-- 로그인 상태에 따라 동적 렌더 -->
    </div>
  </div>

<script>
// ══════════════════════════════════════════
//  Supabase 초기화
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://xyervpopuptydcizofow.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5ZXJ2cG9wdXB0eWRjaXpvZm93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTU0ODksImV4cCI6MjA4OTE5MTQ4OX0.13puNeu_a0JCHaZr7YCikW8B3AJgkeQqTjk8SEomPNg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════
//  메모리 캐시 (Supabase에서 로드 후 유지)
// ══════════════════════════════════════════
let apts = [];
let sise = {}; // { apt_id: [{date, buy, rent, listings, memo}] }
let currentId = null;
let editingId = null;
let chart = null;
let pendingDates = []; // 아직 데이터 없이 추가된 날짜

// ── DB 함수 ────────────────────────────────
async function dbLoadApts() {
  const { data, error } = await sb.from('complexes').select('*').order('name');
  if (error) { console.error('단지 로드 오류:', error.message, error.code, error.details, error.hint); return []; }
  return data || [];
}

async function dbLoadSise() {
  const { data, error } = await sb.from('sise_records').select('*').order('date');
  if (error) { console.error('시세 로드 오류:', error.message, error.code, error.details, error.hint); return {}; }
  const map = {};
  (data || []).forEach(r => {
    if (!map[r.apt_id]) map[r.apt_id] = [];
    map[r.apt_id].push({ id: r.id, date: r.date, buy: r.buy, rent: r.rent, listings: r.listings, memo: r.memo });
  });
  return map;
}

async function dbSaveApt(aptData) {
  console.log('dbSaveApt 파라미터:', JSON.stringify(aptData, null, 2));
  const { data, error } = await sb.from('complexes').upsert(aptData, { onConflict: 'id' }).select().single();
  if (error) {
    console.error('dbSaveApt 오류:', error);
    throw error;
  }
  return data;
}

async function dbDeleteApt(aptId) {
  const { error } = await sb.from('complexes').delete().eq('id', aptId);
  if (error) throw error;
}

async function dbSaveRecord(rec) {
  // upsert: apt_id + date unique 제약 활용
  const payload = {
    apt_id: rec.apt_id,
    date: rec.date,
    buy: rec.buy || null,
    rent: rec.rent || null,
    listings: rec.listings || null,
    memo: rec.memo || null,
  };
  const { data, error } = await sb.from('sise_records')
    .upsert(payload, { onConflict: 'apt_id,date' })
    .select().single();
  if (error) throw error;
  return data;
}

async function dbDeleteRecord(recordId) {
  const { error } = await sb.from('sise_records').delete().eq('id', recordId);
  if (error) throw error;
}

// ══════════════════════════════════════════
//  법정동 드롭다운 (Edge Function 연동)
// ══════════════════════════════════════════
const LAWD_FN = 'https://xyervpopuptydcizofow.supabase.co/functions/v1/swift-responder';

async function fetchLawd(params) {
  const url = LAWD_FN + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  const data = await res.json();
  return data.regcodes || [];
}

function setSelectLoading(id, msg='로딩 중...') {
  const el = document.getElementById(id);
  if (el) el.innerHTML = `<option value="">${msg}</option>`;
}

async function initSidoDropdown() {
  setSelectLoading('f_sido', '로딩 중...');
  const codes = await fetchLawd({ type: 'sido' });
  const sido = document.getElementById('f_sido');
  sido.innerHTML = '<option value="">시/도 선택</option>';
  codes.forEach(c => {
    const o = document.createElement('option');
    o.value = c.code.slice(0, 2); // 앞 2자리
    o.dataset.name = c.name;
    o.textContent = c.name;
    sido.appendChild(o);
  });
}

async function onSidoChange() {
  const sido = document.getElementById('f_sido');
  const sidoCd = sido.value; // 2자리
  document.getElementById('f_sigungu').innerHTML = '<option value="">선택</option>';
  document.getElementById('f_dong_sel').innerHTML = '<option value="">선택</option>';
  if (!sidoCd) return;

  setSelectLoading('f_sigungu');
  const codes = await fetchLawd({ type: 'sigungu', sidoCd });
  const sigungu = document.getElementById('f_sigungu');
  sigungu.innerHTML = '<option value="">시/군/구 선택</option>';

  // 코드 끝 5자리가 00000인 것 = 상위 시 레벨 (예: 청주시 4311000000)
  // 끝 5자리가 00000이 아닌 것 = 구/시/군 레벨
  const leafCodes = codes.filter(c => c.code.slice(5) !== '00000');
  // 구 레벨이 하나도 없으면 (군/시 단위) 상위 레벨 사용
  const finalCodes = leafCodes.length > 0 ? leafCodes : codes;

  finalCodes.forEach(c => {
    const o = document.createElement('option');
    o.value = c.code.slice(0, 5);
    // "충청북도 청주시 흥덕구" → "청주시 흥덕구", "충청북도 충주시" → "충주시"
    const parts = c.name.split(' ');
    const displayName = parts.slice(1).join(' '); // 시도명 제거
    o.dataset.name = displayName;
    o.textContent = displayName;
    sigungu.appendChild(o);
  });
}

async function onSigunguChange() {
  const sidoEl = document.getElementById('f_sido');
  const sigunguEl = document.getElementById('f_sigungu');
  const sigunguCd = sigunguEl.value; // 5자리
  document.getElementById('f_dong_sel').innerHTML = '<option value="">선택</option>';

  if (!sigunguCd) return;

  setSelectLoading('f_dong_sel');
  const codes = await fetchLawd({ type: 'dong', sigunguCd });
  const dongSel = document.getElementById('f_dong_sel');
  dongSel.innerHTML = '<option value="">읍/면/동 선택</option>';
  codes.filter(c => !c.name.endsWith('시') && !c.name.endsWith('군') && !c.name.endsWith('구')).forEach(c => {
    const o = document.createElement('option');
    o.value = c.code.slice(0, 8); // 앞 8자리 = 동 단위 식별 코드
    o.dataset.dongName = c.name.split(' ').pop();
    o.textContent = c.name.split(' ').pop();
    dongSel.appendChild(o);
  });
}

function onDongChange() {
  // 동 바뀌면 단지 목록 초기화
  document.getElementById('f_apt_list').innerHTML = '<option value="">🔍 단지 조회 버튼을 누르세요</option>';
}

async function loadAptList() {
  const lawdCd = getSigunguCode();
  const apiKey = localStorage.getItem('rtms_key') || '';
  const sel = document.getElementById('f_apt_list');

  if (!lawdCd) { toast('시/군/구를 먼저 선택하세요', 'err'); return; }
  if (!apiKey) { toast('API 키를 입력하세요', 'err'); return; }
  localStorage.setItem('rtms_key', apiKey);

  sel.innerHTML = '<option value="">로딩 중...</option>';

  try {
    const url = `https://xyervpopuptydcizofow.supabase.co/functions/v1/aptlist?lawdCd=${lawdCd.padEnd(10,'0')}&apiKey=${encodeURIComponent(apiKey)}`;
    const res = await fetch(url);
    const json = await res.json();
    console.log('단지 조회 응답:', JSON.stringify(json).slice(0, 300));

    if (json.error) {
      sel.innerHTML = '<option value="">조회 실패</option>';
      toast('단지 조회 실패: ' + json.error, 'err');
      return;
    }

    const arr = json.items || [];
    const dongCode = getDongCode(); // 8자리 동 코드

    // 동이 선택됐으면 해당 동 단지만 필터 (bjdCode 앞 8자리가 동 코드와 일치)
    const filtered = dongCode
      ? arr.filter(item => item.bjdCode && item.bjdCode.startsWith(dongCode))
      : arr;

    if (filtered.length === 0) {
      sel.innerHTML = arr.length > 0
        ? '<option value="">선택한 동에 단지 없음 (동 선택 해제 후 재조회하면 전체 표시)</option>'
        : '<option value="">해당 지역에 단지 없음</option>';
      return;
    }

    sel.innerHTML = '<option value="">단지 선택</option>';
    filtered.forEach(item => {
      const o = document.createElement('option');
      const name = item.kaptName || item.kaptname || item.아파트명 || item.단지명 || '';
      const year = item.kaptBuildYear || item.kaptbuildyear || item.건축년도 || '';
      const units = item.kaptdaCnt || item.kaptdacnt || item.총세대수 || '';
      const kaptCode = item.kaptCode || item.kaptcode || '';
      o.value = JSON.stringify({ name, year: year ? parseInt(year) : null, units: units ? parseInt(units) : null, kaptCode });
      o.textContent = `${name}${year ? ` (${year}년` : ''}${units ? `, ${units}세대)` : year ? ')' : ''}`;
      sel.appendChild(o);
    });
    toast(`${filtered.length}개 단지 조회 완료${dongCode ? ` (${arr.length}개 중 필터)` : ''}`);
  } catch(e) {
    sel.innerHTML = '<option value="">오류 발생</option>';
    toast('단지 조회 오류: ' + e.message, 'err');
  }
}

async function onAptListChange() {
  const sel = document.getElementById('f_apt_list');
  if (!sel.value) return;
  try {
    const data = JSON.parse(sel.value);
    if (data.name) document.getElementById('f_name').value = data.name;
    if (data.year) document.getElementById('f_year').value = data.year;
    if (data.units) document.getElementById('f_units').value = data.units;

    // kaptCode 있으면 기본정보 자동 조회
    if (data.kaptCode) {
      const apiKey = localStorage.getItem('rtms_key') || '';
      if (!apiKey) return;

      toast('단지 상세정보 조회 중...');
      const res = await fetch(`https://xyervpopuptydcizofow.supabase.co/functions/v1/kaptinfo?kaptCode=${data.kaptCode}&apiKey=${encodeURIComponent(apiKey)}`);
      const json = await res.json();
      const bass = json.bassItem;
      if (!bass) return;

      // 자동입력
      if (bass.doroJuso) document.getElementById('f_address').value = bass.doroJuso;
      if (bass.kaptdaCnt) document.getElementById('f_units').value = bass.kaptdaCnt;
      if (bass.kaptUsedate) document.getElementById('f_year').value = bass.kaptUsedate.slice(0,4);
      document.getElementById('f_kapt_code').value = data.kaptCode;

      // 카카오 지오코딩으로 위경도 획득
      if (bass.doroJuso) {
        geocodeAddress(bass.doroJuso);
      }
      toast('단지 정보 자동입력 완료 ✓');
    }
  } catch(e) { console.error(e); }
}

function geocodeAddress(address) {
  if (!window.kakao?.maps?.services) return;
  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(address, (result, status) => {
    if (status === kakao.maps.services.Status.OK) {
      document.getElementById('f_lat').value = result[0].y;
      document.getElementById('f_lng').value = result[0].x;
    }
  });
}

let kakaoMap = null;
let mapOverlays = [];
let geocoder = null;
let mapInitialized = false;

function initMap() {
  if (mapInitialized) { renderMapList(); return; }
  mapInitialized = true;

  const container = document.getElementById('kakaoMap');
  const options = { center: new kakao.maps.LatLng(36.35, 127.38), level: 7 };
  kakaoMap = new kakao.maps.Map(container, options);
  geocoder = new kakao.maps.services.Geocoder();

  kakaoMap.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  kakaoMap.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);

  // 필터 초기화
  const regions = [...new Set(apts.map(a => a.region))].sort();
  const sel = document.getElementById('mapRegionFilter');
  regions.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o); });

  document.getElementById('mapSearch').addEventListener('input', renderMapList);
  document.getElementById('mapRegionFilter').addEventListener('change', renderMapList);

  renderMapList();
  placeAllMarkersAsync();
}

async function placeAllMarkersAsync() {
  for (const apt of apts) {
    await placeMarker(apt);
    await new Promise(r => setTimeout(r, 40));
  }
}

function placeMarker(apt) {
  return new Promise(resolve => {
    const records = sise[apt.id] || [];
    const latest = records[records.length - 1];
    const color = latest?.buy
      ? (latest.buy >= 100000 ? '#ef4444' : latest.buy >= 50000 ? '#f59e0b' : '#10b981')
      : '#94a3b8';
    const content = `<div data-apt-id="${apt.id}" onclick="focusAptById('${apt.id}')" style="background:${color};color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.4);font-family:'Noto Sans KR',sans-serif;text-align:center;line-height:1.4">${apt.name}${latest?.buy ? `<br><span style="font-size:10px;opacity:.9">${fmt억(latest.buy)}</span>` : ''}</div>`;

    const addOverlay = (lat, lng) => {
      const coords = new kakao.maps.LatLng(lat, lng);
      const overlay = new kakao.maps.CustomOverlay({ content, position: coords, yAnchor: 1.2 });
      overlay.setMap(kakaoMap);
      overlay._aptId = apt.id;
      overlay._coords = coords;
      mapOverlays.push(overlay);
      resolve();
    };

    // lat/lng 저장돼 있으면 바로 사용
    if (apt.lat && apt.lng) {
      addOverlay(apt.lat, apt.lng);
      return;
    }

    // 없으면 주소로 지오코딩
    const addr = (apt.address || '') || ((apt.region || '') + ' ' + (apt.dong || ''));
    if (!addr.trim()) { resolve(); return; }

    geocoder.addressSearch(addr, (result, status) => {
      if (status !== kakao.maps.services.Status.OK) { resolve(); return; }
      addOverlay(result[0].y, result[0].x);
    });
  });
}

function renderMapList() {
  const q = document.getElementById('mapSearch')?.value?.trim().toLowerCase() || '';
  const region = document.getElementById('mapRegionFilter')?.value || '';
  const filtered = apts.filter(a =>
    (!q || a.name.toLowerCase().includes(q) || (a.region||'').toLowerCase().includes(q)) &&
    (!region || a.region === region)
  );

  const el = document.getElementById('mapAptList');
  el.innerHTML = '';
  filtered.forEach(a => {
    const records = sise[a.id] || [];
    const latest = records[records.length - 1];
    const div = document.createElement('div');
    div.style.cssText = 'padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border2);transition:background .1s';
    div.innerHTML = `
      <div style="font-size:13px;font-weight:500;margin-bottom:2px">${a.name}</div>
      <div style="font-size:11px;color:var(--text3);display:flex;gap:6px">
        <span>${a.region}</span>
        ${latest?.buy ? `<span style="color:var(--blue);font-family:'JetBrains Mono',monospace">${fmt억(latest.buy)}</span>` : ''}
      </div>`;
    div.onmouseenter = () => div.style.background = 'var(--surf2)';
    div.onmouseleave = () => div.style.background = '';
    div.onclick = () => focusApt(a);
    el.appendChild(div);
  });

  // 마커 필터
  const idSet = new Set(filtered.map(a => a.id));
  mapOverlays.forEach(o => o.setMap(idSet.has(o._aptId) ? kakaoMap : null));
}

function focusAptById(aptId) {
  const apt = apts.find(a => a.id === aptId);
  if (apt) focusApt(apt);
}

function focusApt(apt) {
  const overlay = mapOverlays.find(o => o._aptId === apt.id);
  if (overlay?._coords) {
    kakaoMap.setCenter(overlay._coords);
    kakaoMap.setLevel(4);
  }
  showMapInfo(apt);
}

function showMapInfo(apt) {
  const records = (sise[apt.id] || []).sort((a,b) => a.date.localeCompare(b.date));
  const latest = records[records.length - 1];
  const encName = encodeURIComponent(apt.name);
  const ratio = latest?.buy && latest?.rent ? Math.round(latest.rent/latest.buy*100) : null;
  const gap = latest?.buy && latest?.rent ? ((latest.buy-latest.rent)/10000).toFixed(1) : null;

  document.getElementById('mapInfoName').textContent = apt.name;
  document.getElementById('mapInfoSub').textContent = `${apt.region} ${apt.dong||''} · ${apt.year||'?'}년 · ${apt.units?.toLocaleString()||'?'}세대`;
  document.getElementById('mapInfoStats').innerHTML = `
    <div style="background:var(--surf2);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">매매가</div>
      <div style="font-size:15px;font-weight:700;color:var(--blue)">${fmt억(latest?.buy)}</div>
    </div>
    <div style="background:var(--surf2);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">전세가율</div>
      <div style="font-size:15px;font-weight:700;color:var(--green)">${ratio !== null ? ratio+'%' : '-'}</div>
    </div>
    <div style="background:var(--surf2);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">갭(억)</div>
      <div style="font-size:15px;font-weight:700;color:var(--amber)">${gap !== null ? gap+'억' : '-'}</div>
    </div>`;
  document.getElementById('mapInfoLinks').innerHTML = `
    <a href="https://search.naver.com/search.naver?query=아실+${encName}" target="_blank" class="btn btn-outline" style="font-size:11px;text-decoration:none;color:var(--green)">📊 아실</a>
    <a href="https://search.naver.com/search.naver?query=호갱노노+${encName}" target="_blank" class="btn btn-outline" style="font-size:11px;text-decoration:none;color:var(--amber)">🏘 호갱노노</a>
    ${apt.link ? `<a href="${apt.link}" target="_blank" class="btn btn-outline" style="font-size:11px;text-decoration:none;color:var(--blue)">🔗 네이버</a>` : ''}
    <button class="btn btn-outline" style="font-size:11px" onclick="selectApt('${apt.id}');switchTab('mgr')">상세 보기 →</button>`;
  document.getElementById('mapInfoBox').style.display = 'block';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['mgr','sheet','map'][i] === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'sheet') {
    const el = document.getElementById('newDateInput');
    if (el && !el.value) el.value = new Date().toISOString().slice(0,10);
    renderSheet();
  }
  if (tab === 'map') initMap();

function fmt억(v) { if (!v) return '-'; return (v/10000).toFixed(2)+'억'; }
function fmt만(v) { if (!v) return '-'; return v.toLocaleString()+'만'; }
function gradeClass(g) { const m={S:'bs',A:'ba',B:'bb',C:'bc'}; return m[g]||'bc'; }
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;

function initFilters() {
  const regions = [...new Set(apts.map(a => a.region))].sort();
  [document.getElementById('regionFilter'), document.getElementById('sheetRegion')].forEach(sel => {
    if (!sel) return;
    const cur = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    regions.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o); });
    sel.value = cur;
  });
}

function getFilteredApts() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const region = document.getElementById('regionFilter')?.value || '';
  const sort = document.getElementById('sortFilter')?.value || 'name';
  return apts
    .filter(a => (!q || a.name.toLowerCase().includes(q) || a.region.toLowerCase().includes(q) || (a.dong||'').toLowerCase().includes(q)) && (!region || a.region === region))
    .sort((a, b) => {
      if (sort === 'region') return (a.region+a.name).localeCompare(b.region+b.name);
      if (sort === 'latest') {
        const la = sise[a.id]?.slice(-1)[0]?.date || '0';
        const lb = sise[b.id]?.slice(-1)[0]?.date || '0';
        return lb.localeCompare(la);
      }
      return a.name.localeCompare(b.name);
    });
}

function renderList() {
  initFilters();
  const filtered = getFilteredApts();
  const list = document.getElementById('aptList');
  document.getElementById('listCount').textContent = `${filtered.length} / ${apts.length}개`;
  list.innerHTML = '';
  filtered.forEach(a => {
    const records = sise[a.id] || [];
    const latest = records[records.length - 1];
    const div = document.createElement('div');
    div.className = 'list-item' + (a.id === currentId ? ' sel' : '');
    div.innerHTML = `
      <div class="li-name">

        <span>${a.region}</span><span>${a.dong||''}</span>

        class="btn btn-outline" style="text-decoration:none;color:var(--blue);font-size:12px">🔗 네이버</a>` : ''}
    </div>
    <div id="realtrade_result_${apt.id}" style="font-size:11px;color:var(--text3)">공공API 조회 버튼을 누르면 최근 3개월 실거래 내역을 표시합니다</div>
  </div>

  <!-- 시세 입력 -->
  <div class="sec">
    <div class="sec-title"><div class="sec-title-l">시세 입력</div></div>
    <div class="input-row">
      <div class="ig"><label>날짜</label><input type="date" id="inp_date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="ig"><label>매매가 (만원)</label><input type="number" id="inp_buy" placeholder="예: 45000"></div>
      <div class="ig"><label>전세가 (만원)</label><input type="number" id="inp_rent" placeholder="예: 30000"></div>
      <div class="ig"><label>매물수</label><input type="number" id="inp_listings" placeholder="예: 5"></div>
      <div class="ig"><label>메모</label><input type="text" id="inp_memo" placeholder="자유입력"></div>
      <button class="btn btn-primary" onclick="saveRecord('${apt.id}')">저장</button>
    </div>
  </div>

  <!-- 차트 -->
  ${records.length > 1 ? `
  <div class="sec">
    <div class="sec-title"><div class="sec-title-l">시세 추이</div></div>
    <div class="chart-box"><canvas id="mainChart"></canvas></div>
  </div>` : ''}

  <!-- 이력 -->
  <div class="sec">
    <div class="sec-title">
      <div class="sec-title-l">입력 이력</div>
      <span style="font-size:11px;color:var(--text3);font-weight:400">${records.length}건</span>
    </div>
    ${records.length === 0 ? `<div class="no-data">데이터 없음</div>` : `
    <table class="tbl">
      <thead><tr><th>날짜</th><th>매매가</th><th>전세가</th><th>전세가율</th><th>Gap</th><th>평단가</th><th>매물</th><th>메모</th><th></th></tr></thead>
      <tbody>
        ${records.slice().reverse().map((r, i) => {
          const ri = records.length - 1 - i;
          const pr = records[ri - 1];
          const ratio = r.buy && r.rent ? Math.round(r.rent/r.buy*100) : null;
          const gap = r.buy && r.rent ? r.buy - r.rent : null;
          const pyeong = r.buy && apt.private_pyeong ? Math.round(r.buy/apt.private_pyeong/100) : null;
          const trend = pr?.buy ? (r.buy > pr.buy ? 'up' : r.buy < pr.buy ? 'dn' : 'flat') : '';
          return `<tr>
            <td>${r.date}</td>
            <td class="price ${trend}">${fmt억(r.buy)}</td>
            <td class="ratio">${fmt억(r.rent)}</td>
            <td>${ratio !== null ? ratio+'%' : '-'}</td>
            <td class="gap">${gap ? fmt만(gap) : '-'}</td>
            <td style="color:var(--text3)">${pyeong ? pyeong+'백/평' : '-'}</td>
            <td style="color:var(--purple)">${r.listings !== undefined ? r.listings+'건' : '-'}</td>
            <td style="color:var(--text3);font-family:'Noto Sans KR',sans-serif;font-size:11px">${r.memo||''}</td>
            <td><button class="btn btn-ghost" style="font-size:10px;padding:2px 6px" onclick="deleteRecord('${apt.id}',${ri})">✕</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`}
  </div>
  `;

  if (records.length > 1) setTimeout(() => initChart(apt, records), 30);
}

async function fetchRealTrade(aptId, lawdCd, aptName) {
  const resultEl = document.getElementById(`realtrade_result_${aptId}`);
  const apiKey = localStorage.getItem('rtms_key') || '';

  console.log('fetchRealTrade 파라미터:', { aptId, lawdCd, aptName, apiKey: apiKey.slice(0,10)+'...' });

  if (!apiKey) { toast('⚙️ 설정에서 API 키를 먼저 입력하세요', 'err'); return; }
  if (!lawdCd) { toast('단지 편집에서 시/군/구를 선택해 법정동 코드를 저장하세요', 'err'); return; }

  resultEl.innerHTML = '<div class="loading">조회 중...</div>';

  try {
    const now = new Date();
    const months = [];
    for (let i = 2; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`);
    }

    const REALTRADE_FN = 'https://xyervpopuptydcizofow.supabase.co/functions/v1/realtrade';
    const results = [];

    for (const ym of months) {
      const url = `${REALTRADE_FN}?lawdCd=${lawdCd}&dealYmd=${ym}&apiKey=${encodeURIComponent(apiKey)}`;
      console.log('realtrade 호출 URL:', url.replace(apiKey, apiKey.slice(0,10)+'...'));
      const res = await fetch(url);
      const json = await res.json();

      const resultCode = json?.response?.header?.resultCode;
      if (resultCode && resultCode !== '00' && resultCode !== '000') {
        resultEl.innerHTML = `<div style="color:var(--red)">API 오류: ${json?.response?.header?.resultMsg} (코드: ${resultCode})</div>`;
        return;
      }

      const items = json?.response?.body?.items?.item || [];
      const arr = Array.isArray(items) ? items : (items && Object.keys(items).length ? [items] : []);
      const nameNorm = aptName.replace(/\s/g,'');
      arr.forEach(item => {
        if (!item.년) return;
        const itemNorm = (item.아파트||'').replace(/\s/g,'');
        // 양방향 포함 여부 체크 (공백 제거 후)
        if (nameNorm && !itemNorm.includes(nameNorm) && !nameNorm.includes(itemNorm)) return;
        results.push({
          date: `${item.년}-${String(item.월).padStart(2,'0')}-${String(item.일).padStart(2,'0')}`,
          name: item.아파트,
          area: parseFloat(item.전용면적),
          price: parseInt((item.거래금액||'').replace(/,/g,'')),
          floor: item.층,
        });
      });
    }

    results.sort((a,b) => b.date.localeCompare(a.date));

    if (results.length === 0) {
      resultEl.innerHTML = `<div style="color:var(--text3)">
        "${aptName}" 최근 3개월 거래 없음 (법정동: ${lawdCd})<br>
        <button class="btn btn-outline" style="font-size:11px;margin-top:6px" 
          onclick="fetchRealTradeAll('${aptId}', '${lawdCd}')">해당 법정동 전체 조회</button>
      </div>`;
      return;
    }

    resultEl.innerHTML = `
      <div class="api-result">
        <div class="api-tr hdr"><span>날짜</span><span>단지명</span><span>가격</span><span>면적</span><span>층</span></div>
        ${results.slice(0,20).map(r => `
        <div class="api-tr" onclick="applyRealTrade(${r.price}, '${r.date}', '${aptId}')" title="클릭하면 매매가로 입력">
          <span>${r.date}</span>
          <span style="color:var(--text2)">${r.name||'-'}</span>
          <span class="api-price">${(r.price/10000).toFixed(2)}억</span>
          <span class="api-info">${r.area}㎡</span>
          <span class="api-info">${r.floor}층</span>
        </div>`).join('')}
      </div>
      <div style="color:var(--text3);padding:5px 8px;font-size:10px">클릭하면 아래 시세 입력에 매매가 자동입력 (최근 3개월 ${results.length}건)</div>`;
  } catch(e) {
    resultEl.innerHTML = `<div style="color:var(--red)">오류: ${e.message}</div>`;
  }
}

function applyRealTrade(price, date, aptId) {
  document.getElementById('inp_date').value = date;

  toast(`${date} 실거래가 ${(price/10000).toFixed(2)}억 입력`);

async function fetchRealTradeAll(aptId, lawdCd) {
  // 단지명 필터 없이 전체 조회
  const resultEl = document.getElementById(`realtrade_result_${aptId}`);
  const apiKey = localStorage.getItem('rtms_key') || '';
  resultEl.innerHTML = '<div class="loading">전체 조회 중...</div>';

  const now = new Date();
  const months = [];
  for (let i = 2; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`);
  }

  const REALTRADE_FN = 'https://xyervpopuptydcizofow.supabase.co/functions/v1/realtrade';
  const results = [];
  for (const ym of months) {
    const res = await fetch(`${REALTRADE_FN}?lawdCd=${lawdCd}&dealYmd=${ym}&apiKey=${encodeURIComponent(apiKey)}`);
    const json = await res.json();
    const items = json?.response?.body?.items?.item || [];
    const arr = Array.isArray(items) ? items : (items && Object.keys(items).length ? [items] : []);
    arr.forEach(item => {
      if (!item.년) return;
      results.push({
        date: `${item.년}-${String(item.월).padStart(2,'0')}-${String(item.일).padStart(2,'0')}`,
        name: item.아파트, area: parseFloat(item.전용면적),
        price: parseInt((item.거래금액||'').replace(/,/g,'')), floor: item.층,
      });
    });
  }
  results.sort((a,b) => b.date.localeCompare(a.date));
  if (results.length === 0) { resultEl.innerHTML = '<div style="color:var(--text3)">거래 없음</div>'; return; }
  resultEl.innerHTML = `
    <div class="api-result">
      <div class="api-tr hdr"><span>날짜</span><span>단지명</span><span>가격</span><span>면적</span><span>층</span></div>
      ${results.slice(0,30).map(r => `
      <div class="api-tr" onclick="applyRealTrade(${r.price}, '${r.date}', '${aptId}')">
        <span>${r.date}</span><span style="color:var(--text2)">${r.name||'-'}</span>
        <span class="api-price">${(r.price/10000).toFixed(2)}억</span>
        <span class="api-info">${r.area}㎡</span><span class="api-info">${r.floor}층</span>
      </div>`).join('')}
    </div>
    <div style="color:var(--text3);padding:5px 8px;font-size:10px">전체 ${results.length}건</div>`;
}

async function saveRecord(aptId) {
  if (!currentUser) { showLogin(); return; }
  const date = document.getElementById('inp_date').value;
  const buy = parseInt(document.getElementById('inp_buy').value) || null;
  const rent = parseInt(document.getElementById('inp_rent').value) || null;
  const listings = document.getElementById('inp_listings').value;
  const memo = document.getElementById('inp_memo').value.trim();
  if (!date || (!buy && !rent)) { toast('날짜와 가격을 입력하세요', 'err'); return; }
  try {
    const saved = await dbSaveRecord({ apt_id: aptId, date, buy, rent,
      listings: listings ? parseInt(listings) : null, memo: memo || null });
    // 캐시 업데이트
    if (!sise[aptId]) sise[aptId] = [];
    const idx = sise[aptId].findIndex(r => r.date === date);
    const rec = { id: saved.id, date, buy, rent,
      listings: listings ? parseInt(listings) : undefined, memo: memo || undefined };
    if (idx >= 0) sise[aptId][idx] = rec;
    else { sise[aptId].push(rec); sise[aptId].sort((a,b) => a.date.localeCompare(b.date)); }
    toast('저장 완료 ✓');
    document.getElementById('inp_buy').value = '';
    document.getElementById('inp_rent').value = '';
    document.getElementById('inp_listings').value = '';
    document.getElementById('inp_memo').value = '';
    renderDetail(apts.find(a => a.id === aptId));
    renderList();
  } catch(e) { toast('저장 실패: ' + e.message, 'err'); }
}

async function deleteRecord(aptId, idx) {
  if (!currentUser) { showLogin(); return; }
  if (!confirm('삭제하시겠습니까?')) return;
  const rec = sise[aptId]?.[idx];
  if (!rec) return;
  try {
    if (rec.id) await dbDeleteRecord(rec.id);
    sise[aptId].splice(idx, 1);
    if (!sise[aptId].length) delete sise[aptId];
    renderDetail(apts.find(a => a.id === aptId));
    renderList();
    toast('삭제 완료');
  } catch(e) { toast('삭제 실패: ' + e.message, 'err'); }
}

function initChart(apt, records) {

  const ctx = document.getElementById('mainChart');
  if (!ctx) return;
  const sorted = [...records].sort((a,b) => a.date.localeCompare(b.date));
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: sorted.map(r => r.date),
      datasets: [
        { label:'매매가', data: sorted.map(r=>r.buy?r.buy/10000:null), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.1)', borderWidth:2, pointRadius:4, tension:.3, fill:true, spanGaps:true },
        { label:'전세가', data: sorted.map(r=>r.rent?r.rent/10000:null), borderColor:'#10b981', backgroundColor:'rgba(16,185,129,.08)', borderWidth:2, pointRadius:4, tension:.3, fill:true, spanGaps:true }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#94a3b8',font:{family:'Noto Sans KR',size:11}}},
        tooltip:{backgroundColor:'#1e2840',borderColor:'#243050',borderWidth:1,titleColor:'#e2e8f0',bodyColor:'#94a3b8',
          callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(2)}억`}}

      scales:{
        x:{ticks:{color:'#4a5568',font:{size:10}},grid:{color:'rgba(36,48,80,.4)'}},
        y:{ticks:{color:'#4a5568',font:{size:10},callback:v=>v.toFixed(1)+'억'},grid:{color:'rgba(36,48,80,.4)'}}
      }
    }
  });
}

async function saveApt() {
  if (!currentUser) { showLogin(); return; }
  const name = document.getElementById('f_name').value.trim();
  if (!name) { toast('단지명을 입력하세요', 'err'); return; }
  const supplyArea = parseFloat(document.getElementById('f_supply').value) || null;
  const privateArea = parseFloat(document.getElementById('f_private').value) || null;
  const dongSel = document.getElementById('f_dong_sel');
  const dongName = dongSel.selectedOptions[0]?.dataset.dongName || null;
  const data = {
    name, region: document.getElementById('f_region').value.trim(),
    dong: dongName,
    year: parseInt(document.getElementById('f_year').value) || null,
    units: parseInt(document.getElementById('f_units').value) || null,
    supply_area: supplyArea,
    private_area: privateArea,
    supply_pyeong: supplyArea ? Math.round(supplyArea/3.305795*10)/10 : null,
    private_pyeong: privateArea ? Math.round(privateArea/3.305795*10)/10 : null,
    work: document.getElementById('f_work').value || null,
    traffic: document.getElementById('f_traffic').value || null,
    env: document.getElementById('f_env').value || null,
    school: document.getElementById('f_school').value || null,
    structure: document.getElementById('f_structure').value.trim() || null,
    link: document.getElementById('f_link').value.trim() || null,
    lawd_cd: getSigunguCode(),
    kapt_code: document.getElementById('f_kapt_code').value || null,
    address: document.getElementById('f_address').value.trim() || null,
    lat: parseFloat(document.getElementById('f_lat').value) || null,
    lng: parseFloat(document.getElementById('f_lng').value) || null,
  };
  try {
    if (editingId) {
      data.id = editingId;
      await dbSaveApt(data);
      const idx = apts.findIndex(a => a.id === editingId);
      apts[idx] = { ...apts[idx], ...data };
      toast('수정 완료 ✓');
      closeModal('aptModal');
      renderList();
      if (currentId === editingId) renderDetail(apts[idx]);
    } else {
      const id = 'apt_u' + Date.now();
      data.id = id;
      await dbSaveApt(data);
      apts.push(data);
      closeModal('aptModal');
      initFilters();
      renderList();
      selectApt(id);
      toast('단지 추가 완료 ✓');
    }
  } catch(e) { toast('저장 실패: ' + e.message, 'err'); }
}

async function deleteApt(aptId) {

function getSheetApts() {
  const q = document.getElementById('sheetSearch')?.value?.trim().toLowerCase() || '';
  const region = document.getElementById('sheetRegion')?.value || '';
  return apts.filter(a =>
    (!q || a.name.toLowerCase().includes(q) || (a.dong||'').toLowerCase().includes(q)) &&
    (!region || a.region === region)
  );
}

function getAllDates() {
  const dateSet = new Set(pendingDates);
  Object.values(sise).forEach(recs => recs?.forEach(r => dateSet.add(r.date)));
  return [...dateSet].sort();
}

function renderSheet() {
  const wrap = document.getElementById('sheetWrap');
  const filtered = getSheetApts();
  const dateFilter = document.getElementById('sheetDateFilter')?.value || '';

  // 날짜 목록 (필터 셀렉트 채우기) - 내림차순
  const allDates = getAllDates().reverse();
  const dateFilterEl = document.getElementById('sheetDateFilter');
  if (dateFilterEl) {
    const cur = dateFilterEl.value;
    while (dateFilterEl.options.length > 1) dateFilterEl.remove(1);
    allDates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dateFilterEl.appendChild(o); });
    dateFilterEl.value = cur;
  }
  const dates = dateFilter ? [dateFilter] : allDates;

  // 표 구성: 가로 = 단지, 세로 = [단지정보 + 날짜별 매매/전세/매물/계산값]
  // 헤더: 구분 | 단지1 | 단지2 | ...
  let html = `<table class="sheet-tbl"><thead><tr>
    <th style="min-width:90px">구분</th>
    ${filtered.map(a => `<th style="min-width:150px;max-width:180px">
      <div style="overflow:hidden;text-overflow:ellipsis;max-width:160px">${a.name}</div>
      <div style="font-size:9px;color:var(--text3);font-weight:400">${a.region} ${a.dong||''}</div>
    </th>`).join('')}
  </tr></thead><tbody>`;

  // 고정 정보 행들
  const infoRows = [
    { lbl: '입주연도', fn: a => a.year ? `<span style="color:var(--text2)">${a.year}</span>` : '-' },
    { lbl: '세대수', fn: a => a.units ? `<span style="color:var(--text2)">${a.units.toLocaleString()}</span>` : '-' },
    { lbl: '전용평형', fn: a => a.private_pyeong ? `<span style="color:var(--text2)">${a.private_pyeong}평</span>` : '-' },
    { lbl: '직장/교통', fn: a => [a.work&&`<span class="badge ${gradeClass(a.work)}" style="font-size:9px;padding:1px 4px">${a.work}</span>`, a.traffic&&`<span class="badge ${gradeClass(a.traffic)}" style="font-size:9px;padding:1px 4px">${a.traffic}</span>`].filter(Boolean).join(' ') || '-' },
  ];

  infoRows.forEach(row => {
    html += `<tr><td class="row-label">${row.lbl}</td>${filtered.map(a => `<td class="cell-val" style="min-width:90px;text-align:center;padding:5px 8px;background:var(--surf1)">${row.fn(a)}</td>`).join('')}</tr>`;
  });

  // 날짜별 데이터 행
  dates.forEach(date => {
    // 날짜 구분선
    html += `<tr><td class="row-date-label" colspan="${filtered.length+1}" style="text-align:left;font-size:11px;color:var(--blue);background:rgba(59,130,246,.06)!important;border-top:1px solid rgba(59,130,246,.25)!important;padding:5px 12px!important;position:sticky;left:0;width:100%;font-family:'JetBrains Mono',monospace">📅 ${date}</td></tr>`;

    // 매매가 행 (편집 가능)
    html += `<tr class="row-buy"><td class="row-label">매매가</td>
    ${filtered.map(a => {
      const rec = sise[a.id]?.find(r => r.date === date);
      return `<td class="editable-cell">
        <input type="number" value="${rec?.buy||''}" placeholder="-"
          onchange="updateSiseCell('${a.id}','${date}','buy',this.value)"
          onfocus="this.select()">
      </td>`;
    }).join('')}</tr>`;

    // 전세가 행
    html += `<tr class="row-rent"><td class="row-label" style="color:var(--green)">전세가</td>
    ${filtered.map(a => {
      const rec = sise[a.id]?.find(r => r.date === date);
      return `<td class="editable-cell">
        <input type="number" value="${rec?.rent||''}" placeholder="-"
          style="color:var(--green)"
          onchange="updateSiseCell('${a.id}','${date}','rent',this.value)"
          onfocus="this.select()">
      </td>`;
    }).join('')}</tr>`;

    // 매물수 행
    html += `<tr class="row-listings"><td class="row-label" style="color:var(--purple)">매물수</td>
    ${filtered.map(a => {
      const rec = sise[a.id]?.find(r => r.date === date);
      return `<td class="editable-cell">
        <input type="number" value="${rec?.listings!==undefined?rec.listings:''}" placeholder="-"
          style="color:var(--purple)"
          onchange="updateSiseCell('${a.id}','${date}','listings',this.value)"
          onfocus="this.select()">
      </td>`;
    }).join('')}</tr>`;

    // 계산값 행 (전세가율, Gap, 평단가)
    html += `<tr class="row-calc"><td class="row-label" style="color:var(--text3)">전세가율</td>
    ${filtered.map(a => {
      const rec = sise[a.id]?.find(r => r.date === date);
      const v = rec?.buy && rec?.rent ? Math.round(rec.rent/rec.buy*100) : null;
      return `<td class="cell-val cell-ratio">${v !== null ? v+'%' : '-'}</td>`;
    }).join('')}</tr>`;

    html += `<tr class="row-calc"><td class="row-label" style="color:var(--amber)">Gap(만)</td>
    ${filtered.map(a => {
      const rec = sise[a.id]?.find(r => r.date === date);
      const v = rec?.buy && rec?.rent ? (rec.buy - rec.rent).toLocaleString() : null;
      return `<td class="cell-val cell-gap">${v !== null ? v : '-'}</td>`;
    }).join('')}</tr>`;

    html += `<tr class="row-calc"><td class="row-label">평단가(백)</td>
    ${filtered.map(a => {
      const rec = sise[a.id]?.find(r => r.date === date);
      const v = rec?.buy && a.private_pyeong ? Math.round(rec.buy/a.private_pyeong/100) : null;
      return `<td class="cell-val cell-pyeong">${v !== null ? v : '-'}</td>`;
    }).join('')}</tr>`;
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

async function updateSiseCell(aptId, date, field, value) {
  if (!currentUser) { showLogin(); return; }
  if (!sise[aptId]) sise[aptId] = [];
  let rec = sise[aptId].find(r => r.date === date);

  const parsed = (value === '' || value === null) ? null : parseInt(value);

  if (!rec) {
    rec = { date, buy: null, rent: null, listings: null };
    sise[aptId].push(rec);
    sise[aptId].sort((a,b) => a.date.localeCompare(b.date));
  }
  rec[field] = parsed;

  // 빈 레코드면 DB에서 삭제
  if (!rec.buy && !rec.rent && !rec.listings) {
    if (rec.id) {
      try { await dbDeleteRecord(rec.id); } catch(e) { console.error(e); }
    }
    sise[aptId] = sise[aptId].filter(r => r.date !== date);
    if (!sise[aptId].length) delete sise[aptId];
  } else {
    try {
      const saved = await dbSaveRecord({ apt_id: aptId, date,
        buy: rec.buy, rent: rec.rent, listings: rec.listings, memo: rec.memo });
      rec.id = saved.id;
      // 실제 데이터 저장됐으면 pendingDates에서 제거
      pendingDates = pendingDates.filter(d => d !== date);
    } catch(e) { toast('저장 실패: ' + e.message, 'err'); return; }
  }

  renderList();
  setTimeout(() => renderSheet(), 80);
}

function addNewDateRow() {
  if (!currentUser) { showLogin(); return; }
  const d = document.getElementById('newDateInput')?.value;
  if (!d) return;
  if (!getAllDates().includes(d)) {
    pendingDates.push(d);
  }
  renderSheet();
  // 추가된 날짜 행으로 스크롤
  setTimeout(() => {
    const rows = document.querySelectorAll('.row-date-label');
    for (const row of rows) {
      if (row.textContent.includes(d)) {
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        break;
      }
    }
  }, 150);
}

// ══════════════════════════════════════════
//  CSV 내보내기
// ══════════════════════════════════════════
function exportCSV() {
  const rows = [['단지ID','단지명','지역','동','날짜','매매가','전세가','전세가율','Gap','매물수','메모']];
  apts.forEach(a => {
    (sise[a.id]||[]).forEach(r => {
      const ratio = r.buy && r.rent ? (r.rent/r.buy*100).toFixed(1) : '';
      const gap = r.buy && r.rent ? r.buy - r.rent : '';
      rows.push([a.id, a.name, a.region, a.dong||'', r.date, r.buy||'', r.rent||'', ratio, gap, r.listings||'', r.memo||'']);
    });
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `시세트래킹_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV 다운로드 완료');
}
